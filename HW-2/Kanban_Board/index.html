<!DOCTYPE html>
<html>
<head>
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="board">

        <div class="column" id="todo">
            <h2>To Do</h2>

            <div class="card" draggable="true">
                Learn HTML
            </div>

            <div class="card" draggable="true">
                Learn CSS
            </div>

        </div>

        <div class="column" id="progress">
            <h2>In Progress</h2>
        </div>

        <div class="column" id="done">
            <h2>Done</h2>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
